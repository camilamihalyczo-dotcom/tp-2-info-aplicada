<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aventura Gráfica — p5.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #aaa;
    }
    h1 {
      font-size: 13px;
      letter-spacing: 3px;
      color: #556;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    canvas {
      display: block;
      border: 1px solid #223;
      border-radius: 4px;
      box-shadow: 0 0 40px #0006;
    }
    p {
      margin-top: 10px;
      font-size: 11px;
      color: #445;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Aventura Gráfica Interactiva</h1>

  <!-- p5.js desde CDN oficial -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>

  <!-- Tu sketch -->
  <script src="sketch.js"></script>

  <p>clic en botones e ingredientes para interactuar</p>
</body>
</html>
